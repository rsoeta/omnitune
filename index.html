<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniTune - Music Player</title>

    <!-- Link ke Manifest -->
    <link rel="manifest" href="./manifest.json">
    <!-- Meta tag untuk mewarnai status bar HP -->
    <meta name="theme-color" content="#222222">
    <!-- Ikon untuk perangkat Apple / iOS -->
    <link rel="apple-touch-icon" href="./icon-192x192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neu: { bg: '#222222', text: '#a3a3a3', textDark: '#ffffff', accent: '#3b82f6' }
                    },
                    boxShadow: {
                        'neu': '8px 8px 16px #151515, -8px -8px 16px #2f2f2f',
                        'neu-btn': '4px 4px 8px #151515, -4px -4px 8px #2f2f2f',
                        'neu-inset': 'inset 6px 6px 12px #151515, inset -6px -6px 12px #2f2f2f',
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

    <!-- Masukkan library Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer onload="gisLoaded()"></script>

</head>
<body class="bg-neu-bg min-h-screen flex items-center justify-center font-sans p-4">

    <!-- Elemen Tersembunyi -->
    <audio id="audio-player"></audio>
    <input type="file" id="folder-input" webkitdirectory directory multiple class="hidden">

    <!-- ========================================== -->
    <!-- VIEW 1: PLAYER VIEW (Tampil Default)         -->
    <!-- ========================================== -->
    <div id="view-player" class="w-full max-w-[340px] bg-neu-bg rounded-[40px] shadow-neu p-6 relative overflow-hidden transition-all duration-300">
        <div class="flex justify-between items-center text-neu-text mb-6">
            <button class="w-10 h-10 rounded-full shadow-neu-btn flex items-center justify-center">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
            </button>
            <span class="text-xs font-bold tracking-widest">NOW PLAYING</span>
            <!-- Tombol ke Library -->
            <button id="btn-go-library" class="w-10 h-10 rounded-full shadow-neu-btn flex items-center justify-center active:shadow-neu-inset">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
            </button>
        </div>

        <div class="w-full aspect-square rounded-[32px] shadow-neu-inset p-2 mb-8">
            <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=600&auto=format&fit=crop" class="w-full h-full object-cover rounded-[24px]">
        </div>

        <div class="text-center mb-8">
            <h1 id="player-title" class="text-neu-textDark font-bold text-xl mb-1 truncate px-2">Belum ada lagu</h1>
            <p id="player-artist" class="text-neu-text text-sm">Pilih dari Library</p>
        </div>

        <div class="flex items-center text-[10px] text-neu-text mb-8">
            <span id="time-current">0:00</span>
            <div class="flex-1 h-2 mx-3 bg-neu-bg shadow-neu-inset rounded-full relative cursor-pointer" id="progress-container">
                <div id="progress-fill" class="absolute top-0 left-0 h-full w-0 bg-gray-500 rounded-full pointer-events-none"></div>
            </div>
            <span id="time-duration">0:00</span>
        </div>

        <div class="mx-auto w-56 h-56 rounded-full shadow-neu relative flex items-center justify-center">
            <button id="btn-shuffle" class="absolute top-4 text-neu-text hover:text-neu-textDark transition-colors">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" /></svg>
            </button>
            <button class="absolute top-4 text-neu-text">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" /></svg>
            </button>
            <button id="btn-play-pause" class="absolute bottom-4 text-neu-text hover:text-neu-textDark transition-colors">
                <svg id="icon-play-pause" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>
            </button>
            <button id="btn-prev" class="absolute left-4 text-neu-text hover:text-neu-textDark">
                <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" /></svg>
            </button>
            <button id="btn-next" class="absolute right-4 text-neu-text hover:text-neu-textDark">
                <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" /></svg>
            </button>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- VIEW 2: LIBRARY VIEW (Sembunyi Default)      -->
    <!-- ========================================== -->
    <div id="view-library" class="hidden w-full max-w-[340px] h-[700px] bg-neu-bg rounded-[40px] shadow-neu relative overflow-hidden flex flex-col transition-all duration-300">
        <div class="p-6 pb-4">
            <div class="flex justify-between items-center text-neu-text mb-6">
                <!-- Tombol Kembali ke Player -->
                <button id="btn-go-player" class="w-10 h-10 rounded-full shadow-neu-btn flex items-center justify-center active:shadow-neu-inset">
                    <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" /></svg>
                </button>
                <span class="text-sm font-bold tracking-widest text-neu-textDark">OMNITUNE</span>
                
                <!-- TUTORIAL: Tambahkan onclick="loginDanMuatLibrary()" di tombol ini -->
                <button id="btn-add-source" onclick="loginDanMuatLibrary()" class="w-10 h-10 rounded-full shadow-neu-btn flex items-center justify-center active:shadow-neu-inset hover:text-green-500 transition-colors">
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>
                </button>

            </div>
            <div class="flex items-center bg-neu-bg shadow-neu-inset rounded-2xl px-4 py-3 mb-2">
                <svg class="h-5 w-5 text-neu-text mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                <input type="text" placeholder="Cari lagu..." class="bg-transparent border-none outline-none text-neu-textDark text-sm w-full">
            </div>
        </div>

        <div id="song-list-container" class="flex-1 overflow-y-auto no-scrollbar px-6 pb-24">
            <!-- List Lagu akan dirender di sini -->
            <div class="text-center text-neu-text mt-10 text-sm">Klik ikon + di kanan atas untuk menghubungkan Google Drive Anda.</div>
        </div>

        <!-- Mini Player -->
        <div id="mini-player" class="absolute bottom-6 left-6 right-6 bg-neu-bg shadow-neu rounded-2xl p-3 flex items-center justify-between z-10 cursor-pointer hidden">
            <div class="flex items-center gap-3 w-3/4">
                <div class="w-10 h-10 rounded-xl shadow-neu-inset p-1 flex-shrink-0">
                    <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=200&auto=format&fit=crop" class="w-full h-full object-cover rounded-lg">
                </div>
                <div class="truncate">
                    <h4 id="mini-title" class="text-neu-textDark text-xs font-bold truncate">Sedang dimuat</h4>
                    <p id="mini-artist" class="text-neu-text text-[10px] truncate">Lokal</p>
                </div>
            </div>
            <button id="btn-mini-play" class="w-10 h-10 rounded-full shadow-neu-btn flex items-center justify-center text-neu-textDark flex-shrink-0">
                <svg id="icon-mini-play" class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>
            </button>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- LOGIKA JAVASCRIPT & ALUR DATA                -->
    <!-- ========================================== -->
    <script>
        // --- KONFIGURASI GOOGLE IDENTITY SERVICES ---
        const CLIENT_ID = '1000879481177-jk68479a8p8tdh5b3q7qtvfufar17q5b.apps.googleusercontent.com'; // PASTIKAN INI DIISI
        const SCOPES = 'https://www.googleapis.com/auth/drive.readonly';
        
        let tokenClient;
        let userAccessToken = null;

        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (tokenResponse) => {
                    if (tokenResponse && tokenResponse.access_token) {
                        userAccessToken = tokenResponse.access_token;
                        tarikLaguLangsungDariGoogle(); 
                    }
                },
            });
        }

        function loginDanMuatLibrary() {
            if (tokenClient) tokenClient.requestAccessToken({prompt: 'consent'});
        }


        // --- STATE & DATA (DAFTAR PUTAR GLOBAL) ---
        let globalPlaylist = [];    // Daftar lagu yang sedang aktif (bisa di-shuffle)
        let originalPlaylist = [];  // Menyimpan urutan asli lagu sebelum di-shuffle
        let currentTrackIndex = -1; // Index lagu yang sedang diputar
        let isShuffle = false;      // Status tombol shuffle

        // --- DOM Elements ---
        const viewPlayer = document.getElementById('view-player');
        const viewLibrary = document.getElementById('view-library');
        const audioPlayer = document.getElementById('audio-player'); 
        
        if (!window.omniAudio) window.omniAudio = new Audio(); 

        const playIcon = '<path d="M8 5v14l11-7z" />';
        const pauseIcon = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />';


        // --- NAVIGASI ANTAR VIEW ---
        document.getElementById('btn-go-library').addEventListener('click', () => {
            viewPlayer.classList.add('hidden');
            viewLibrary.classList.remove('hidden');
        });

        document.getElementById('btn-go-player').addEventListener('click', () => {
            viewLibrary.classList.add('hidden');
            viewPlayer.classList.remove('hidden');
        });


        // --- TAMBAH SUMBER (SWEETALERT) ---
        document.getElementById('btn-add-source').addEventListener('click', () => {
            Swal.fire({
                title: '<span class="text-neu-textDark text-lg font-bold">Tambah Sumber</span>',
                html: '<p class="text-neu-text text-sm mt-2">Pilih lokasi perpustakaan lagu Anda</p>',
                background: '#222222',
                showCancelButton: true,
                confirmButtonText: 'Folder Lokal',
                cancelButtonText: 'Google Drive',
                reverseButtons: true,
                buttonsStyling: false,
                customClass: {
                    popup: 'rounded-[32px] shadow-neu border-none w-[300px] pb-6',
                    actions: 'flex gap-4 w-full px-6 mt-6',
                    confirmButton: 'flex-1 py-3 bg-neu-bg text-neu-textDark text-xs font-bold tracking-wider rounded-2xl shadow-neu-btn active:shadow-neu-inset outline-none',
                    cancelButton: 'flex-1 py-3 bg-neu-bg text-neu-textDark text-xs font-bold tracking-wider rounded-2xl shadow-neu-btn active:shadow-neu-inset outline-none'
                }
            }).then((result) => {
                if (result.isConfirmed) document.getElementById('folder-input').click();
                else if (result.dismiss === Swal.DismissReason.cancel) loginDanMuatLibrary();
            });
        });


        // --- MEMBACA FOLDER LOKAL ---
        document.getElementById('folder-input').addEventListener('change', function(e) {
            const files = Array.from(e.target.files).filter(f => f.type.startsWith('audio/') || f.name.endsWith('.mp3'));
            if(files.length === 0) return;

            // Masukkan ke Daftar Putar Global
            globalPlaylist = files.map(file => ({
                type: 'local',
                id: file.name, // Gunakan nama sebagai ID unik sementara
                title: file.name.replace(/\.[^/.]+$/, ""),
                fileObject: file
            }));
            
            persiapkanPlaylist();
        });


        // --- TARIK LAGU DARI GOOGLE DRIVE (NEUMORPHISM ALERT) ---
        async function tarikLaguLangsungDariGoogle() {
            // Tampilan SweetAlert Neumorphism
            Swal.fire({
                html: `
                    <div class="flex flex-col items-center justify-center p-2">
                        <div class="w-16 h-16 bg-neu-bg rounded-full shadow-neu-inset flex items-center justify-center mb-6 text-neu-textDark animate-pulse">
                            <i class="fa-solid fa-cloud-arrow-down text-2xl"></i>
                        </div>
                        <h3 class="text-neu-textDark font-bold text-lg tracking-wide mb-1">Mencari Lagu</h3>
                        <p class="text-neu-text text-xs">Menyelami Google Drive Anda...</p>
                    </div>
                `,
                background: '#222222',
                showConfirmButton: false,
                allowOutsideClick: false,
                customClass: { popup: 'rounded-[32px] shadow-neu border-none w-72 pb-6' }
            });

            try {
                const url = 'https://www.googleapis.com/drive/v3/files?q=mimeType contains "audio/" and trashed = false&fields=files(id,name,mimeType,size,webContentLink)&pageSize=100';
                const response = await fetch(url, { headers: { 'Authorization': `Bearer ${userAccessToken}` } });
                const data = await response.json();

                if (response.ok) {
                    Swal.close();
                    // Masukkan ke Daftar Putar Global
                    globalPlaylist = data.files.map(file => ({
                        type: 'drive',
                        id: file.id,
                        title: file.name.replace(/\.[^/.]+$/, ""),
                        fileObject: null
                    }));
                    persiapkanPlaylist();
                } else throw new Error(data.error.message);
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'Gagal Memuat', text: error.message, background: '#222222', color: '#E0E0E0' });
            }
        }


        // --- LOGIKA DAFTAR PUTAR & RENDER UI ---
        function persiapkanPlaylist() {
            originalPlaylist = [...globalPlaylist]; // Simpan urutan asli
            if (isShuffle) acakDaftarLagu();        // Acak jika tombol shuffle aktif
            renderUnifiedLibrary();                 // Tampilkan ke layar
        }

        function renderUnifiedLibrary() {
            const container = document.getElementById('song-list-container'); 
            if (!container) return;
            container.innerHTML = ''; 

            if (globalPlaylist.length === 0) {
                container.innerHTML = '<div class="text-center text-neu-text mt-10 text-sm">Tidak ada lagu ditemukan.</div>';
                return;
            }

            globalPlaylist.forEach((track, index) => {
                const icon = track.type === 'local' ? '<i class="fa-solid fa-music"></i>' : '<i class="fa-solid fa-cloud"></i>';
                const sourceText = track.type === 'local' ? 'Memori Lokal' : 'Google Drive';
                const isActive = index === currentTrackIndex ? 'text-green-500' : 'text-neu-textDark';
                
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between p-4 mb-3 bg-neu-bg rounded-xl shadow-neu hover:shadow-neu-inset cursor-pointer transition-all group';
                div.innerHTML = `
                    <div class="flex items-center gap-4 overflow-hidden">
                        <div class="w-10 h-10 flex-shrink-0 rounded-full shadow-neu-inset flex items-center justify-center text-neu-text">
                            ${icon}
                        </div>
                        <div class="flex-1 min-w-0">
                            <h4 id="ui-title-${index}" class="text-sm font-bold ${isActive} truncate group-hover:text-green-500 transition-colors">${track.title}</h4>
                            <p class="text-xs text-neu-text truncate">${sourceText}</p>
                        </div>
                    </div>
                `;
                div.onclick = () => playTrack(index);
                container.appendChild(div);
            });
        }


        // --- MESIN PEMUTAR TUNGGAL (MEMUTUSKAN LOKAL/DRIVE) ---
        async function playTrack(index) {
            if (index < 0 || index >= globalPlaylist.length) return;
            
            // Hentikan semua audio yang sedang jalan
            if (!audioPlayer.paused) audioPlayer.pause();
            if (window.omniAudio && !window.omniAudio.paused) window.omniAudio.pause();

            currentTrackIndex = index;
            const track = globalPlaylist[index];
            const sourceText = track.type === 'local' ? 'Memori Lokal' : 'Google Drive';

            // Update UI Player
            document.getElementById('player-title').innerText = track.title;
            document.getElementById('player-artist').innerText = sourceText;
            document.getElementById('icon-play-pause').innerHTML = pauseIcon;
            
            document.getElementById('mini-player').classList.remove('hidden');
            document.getElementById('mini-title').innerText = track.title;
            document.getElementById('icon-mini-play').innerHTML = pauseIcon;

            // Highlight lagu di Library
            renderUnifiedLibrary(); 

            // Eksekusi Mesin Lokal
            if (track.type === 'local') {
                audioPlayer.src = URL.createObjectURL(track.fileObject);
                audioPlayer.play();
                if ('mediaSession' in navigator) navigator.mediaSession.metadata = new MediaMetadata({ title: track.title, artist: 'Lokal - OmniTune' });
            } 
            // Eksekusi Mesin Drive
            else if (track.type === 'drive') {
                Swal.fire({
                    html: `
                        <div class="flex flex-col items-center justify-center p-2">
                            <div class="w-12 h-12 bg-neu-bg rounded-full shadow-neu-inset flex items-center justify-center mb-4 text-green-500 animate-spin">
                                <i class="fa-solid fa-spinner text-xl"></i>
                            </div>
                            <p class="text-neu-textDark font-bold text-sm tracking-wide text-center truncate w-48">${track.title}</p>
                        </div>
                    `,
                    background: '#222222', showConfirmButton: false,
                    customClass: { popup: 'rounded-[32px] shadow-neu border-none w-64 pb-4' }
                });

                try {
                    const response = await fetch(`https://www.googleapis.com/drive/v3/files/${track.id}?alt=media`, {
                        headers: { 'Authorization': `Bearer ${userAccessToken}` }
                    });
                    if (!response.ok) throw new Error();
                    const audioBlob = await response.blob();
                    window.omniAudio.src = URL.createObjectURL(audioBlob);
                    window.omniAudio.play().then(() => Swal.close());
                    if ('mediaSession' in navigator) navigator.mediaSession.metadata = new MediaMetadata({ title: track.title, artist: 'Drive - OmniTune' });
                } catch (err) {
                    Swal.fire('Error', 'Gagal memutar audio.', 'error');
                }
            }
        }


        // --- KONTROL NAVIGASI (NEXT, PREV, AUTO-PLAY, SHUFFLE) ---
        function playNext() {
            if (currentTrackIndex < globalPlaylist.length - 1) {
                playTrack(currentTrackIndex + 1);
            } else if (globalPlaylist.length > 0) {
                // Jika sudah lagu terakhir, putar ulang dari awal
                playTrack(0);
            }
        }

        function playPrev() {
            if (currentTrackIndex > 0) playTrack(currentTrackIndex - 1);
        }

        function toggleShuffle() {
            if (globalPlaylist.length === 0) return;
            isShuffle = !isShuffle;
            
            const btnShuffle = document.getElementById('btn-shuffle');
            if (isShuffle) {
                btnShuffle.classList.add('text-green-500');
                btnShuffle.classList.remove('text-neu-text');
                
                // Simpan ID lagu yang sedang diputar agar tidak hilang saat diacak
                const currentId = currentTrackIndex > -1 ? globalPlaylist[currentTrackIndex].id : null;
                acakDaftarLagu();
                
                // Cari index baru dari lagu yang sedang diputar
                if (currentId) currentTrackIndex = globalPlaylist.findIndex(t => t.id === currentId);
            } else {
                btnShuffle.classList.add('text-neu-text');
                btnShuffle.classList.remove('text-green-500');
                
                const currentId = currentTrackIndex > -1 ? globalPlaylist[currentTrackIndex].id : null;
                globalPlaylist = [...originalPlaylist]; // Kembalikan urutan asli
                
                if (currentId) currentTrackIndex = globalPlaylist.findIndex(t => t.id === currentId);
            }
            renderUnifiedLibrary();
        }

        function acakDaftarLagu() {
            for (let i = globalPlaylist.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [globalPlaylist[i], globalPlaylist[j]] = [globalPlaylist[j], globalPlaylist[i]];
            }
        }

        // Listener Tombol
        const btnNext = document.getElementById('btn-next');
        const btnPrev = document.getElementById('btn-prev');
        const btnShuffle = document.getElementById('btn-shuffle');
        
        if (btnNext) btnNext.addEventListener('click', playNext);
        if (btnPrev) btnPrev.addEventListener('click', playPrev);
        if (btnShuffle) btnShuffle.addEventListener('click', toggleShuffle);

        // --- AUTO-PLAY (Lanjut ke lagu berikutnya saat selesai) ---
        audioPlayer.addEventListener('ended', playNext);
        window.omniAudio.addEventListener('ended', playNext);

        // --- PROGRESS BAR & KONTROL PLAY/PAUSE (Sama seperti sebelumnya) ---
        const formatTime = sec => isNaN(sec) ? "0:00" : `${Math.floor(sec / 60)}:${Math.floor(sec % 60).toString().padStart(2, '0')}`;
        
        function updateProgressUI(audioElement) {
            document.getElementById('time-current').innerText = formatTime(audioElement.currentTime);
            document.getElementById('time-duration').innerText = formatTime(audioElement.duration);
            if(audioElement.duration) {
                document.getElementById('progress-fill').style.width = `${(audioElement.currentTime / audioElement.duration) * 100}%`;
            }
        }

        audioPlayer.addEventListener('timeupdate', () => updateProgressUI(audioPlayer));
        window.omniAudio.addEventListener('timeupdate', () => updateProgressUI(window.omniAudio));

        document.getElementById('progress-container').addEventListener('click', (e) => {
            const activeAudio = (window.omniAudio.src && !window.omniAudio.paused) ? window.omniAudio : audioPlayer;
            if(activeAudio.duration) activeAudio.currentTime = (e.offsetX / e.currentTarget.clientWidth) * activeAudio.duration;
        });

        function togglePlay() {
            const activeAudio = (window.omniAudio.src && window.omniAudio.currentTime > 0 && !window.omniAudio.ended) ? window.omniAudio : audioPlayer;
            if (!activeAudio.src) return;

            if (activeAudio.paused) {
                activeAudio.play();
                document.getElementById('icon-play-pause').innerHTML = pauseIcon;
                document.getElementById('icon-mini-play').innerHTML = pauseIcon;
            } else {
                activeAudio.pause();
                document.getElementById('icon-play-pause').innerHTML = playIcon;
                document.getElementById('icon-mini-play').innerHTML = playIcon;
            }
        }

        document.getElementById('btn-play-pause').addEventListener('click', togglePlay);
        document.getElementById('btn-mini-play').addEventListener('click', (e) => { e.stopPropagation(); togglePlay(); });
        document.getElementById('mini-player').addEventListener('click', () => {
            viewLibrary.classList.add('hidden'); viewPlayer.classList.remove('hidden');
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Gagal', err)));
        }
    </script>
</body>
</html>
