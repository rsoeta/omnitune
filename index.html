<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniTune - Music Player</title>

    <!-- Link ke Manifest -->
    <link rel="manifest" href="./manifest.json">
    <!-- Meta tag untuk mewarnai status bar HP -->
    <meta name="theme-color" content="#222222">
    <!-- Ikon untuk perangkat Apple / iOS -->
    <link rel="apple-touch-icon" href="./icon-192x192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neu: { bg: '#222222', text: '#a3a3a3', textDark: '#ffffff', accent: '#3b82f6' }
                    },
                    boxShadow: {
                        'neu': '8px 8px 16px #151515, -8px -8px 16px #2f2f2f',
                        'neu-btn': '4px 4px 8px #151515, -4px -4px 8px #2f2f2f',
                        'neu-inset': 'inset 6px 6px 12px #151515, inset -6px -6px 12px #2f2f2f',
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-neu-bg min-h-screen flex items-center justify-center font-sans p-4">

    <!-- Elemen Tersembunyi -->
    <audio id="audio-player"></audio>
    <input type="file" id="folder-input" webkitdirectory directory multiple class="hidden">

    <!-- ========================================== -->
    <!-- VIEW 1: PLAYER VIEW (Tampil Default)         -->
    <!-- ========================================== -->
    <div id="view-player" class="w-full max-w-[340px] bg-neu-bg rounded-[40px] shadow-neu p-6 relative overflow-hidden transition-all duration-300">
        <div class="flex justify-between items-center text-neu-text mb-6">
            <button class="w-10 h-10 rounded-full shadow-neu-btn flex items-center justify-center">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
            </button>
            <span class="text-xs font-bold tracking-widest">NOW PLAYING</span>
            <!-- Tombol ke Library -->
            <button id="btn-go-library" class="w-10 h-10 rounded-full shadow-neu-btn flex items-center justify-center active:shadow-neu-inset">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
            </button>
        </div>

        <div class="w-full aspect-square rounded-[32px] shadow-neu-inset p-2 mb-8">
            <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=600&auto=format&fit=crop" class="w-full h-full object-cover rounded-[24px]">
        </div>

        <div class="text-center mb-8">
            <h1 id="player-title" class="text-neu-textDark font-bold text-xl mb-1 truncate px-2">Belum ada lagu</h1>
            <p id="player-artist" class="text-neu-text text-sm">Pilih dari Library</p>
        </div>

        <div class="flex items-center text-[10px] text-neu-text mb-8">
            <span id="time-current">0:00</span>
            <div class="flex-1 h-2 mx-3 bg-neu-bg shadow-neu-inset rounded-full relative cursor-pointer" id="progress-container">
                <div id="progress-fill" class="absolute top-0 left-0 h-full w-0 bg-gray-500 rounded-full pointer-events-none"></div>
            </div>
            <span id="time-duration">0:00</span>
        </div>

        <div class="mx-auto w-56 h-56 rounded-full shadow-neu relative flex items-center justify-center">
            <button class="w-20 h-20 rounded-full shadow-neu-inset"></button>
            <button class="absolute top-4 text-neu-text"><svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" /></svg></button>
            <button id="btn-play-pause" class="absolute bottom-4 text-neu-text hover:text-neu-textDark transition-colors">
                <svg id="icon-play-pause" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>
            </button>
            <button id="btn-prev" class="absolute left-4 text-neu-text hover:text-neu-textDark"><svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" /></svg></button>
            <button id="btn-next" class="absolute right-4 text-neu-text hover:text-neu-textDark"><svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" /></svg></button>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- VIEW 2: LIBRARY VIEW (Sembunyi Default)      -->
    <!-- ========================================== -->
    <div id="view-library" class="hidden w-full max-w-[340px] h-[700px] bg-neu-bg rounded-[40px] shadow-neu relative overflow-hidden flex flex-col transition-all duration-300">
        <div class="p-6 pb-4">
            <div class="flex justify-between items-center text-neu-text mb-6">
                <!-- Tombol Kembali ke Player -->
                <button id="btn-go-player" class="w-10 h-10 rounded-full shadow-neu-btn flex items-center justify-center active:shadow-neu-inset">
                    <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" /></svg>
                </button>
                <span class="text-sm font-bold tracking-widest text-neu-textDark">OMNITUNE</span>
                <!-- Tombol Tambah Sumber -->
                <button id="btn-add-source" class="w-10 h-10 rounded-full shadow-neu-btn flex items-center justify-center active:shadow-neu-inset">
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>
                </button>
            </div>
            <div class="flex items-center bg-neu-bg shadow-neu-inset rounded-2xl px-4 py-3 mb-2">
                <svg class="h-5 w-5 text-neu-text mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                <input type="text" placeholder="Cari lagu..." class="bg-transparent border-none outline-none text-neu-textDark text-sm w-full">
            </div>
        </div>

        <div id="song-list-container" class="flex-1 overflow-y-auto no-scrollbar px-6 pb-24">
            <!-- List Lagu akan dirender di sini -->
            <div class="text-center text-neu-text mt-10 text-sm">Klik ikon di kanan atas untuk memuat folder musik Anda.</div>
        </div>

        <!-- Mini Player -->
        <div id="mini-player" class="absolute bottom-6 left-6 right-6 bg-neu-bg shadow-neu rounded-2xl p-3 flex items-center justify-between z-10 cursor-pointer hidden">
            <div class="flex items-center gap-3 w-3/4">
                <div class="w-10 h-10 rounded-xl shadow-neu-inset p-1 flex-shrink-0">
                    <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=200&auto=format&fit=crop" class="w-full h-full object-cover rounded-lg">
                </div>
                <div class="truncate">
                    <h4 id="mini-title" class="text-neu-textDark text-xs font-bold truncate">Sedang dimuat</h4>
                    <p id="mini-artist" class="text-neu-text text-[10px] truncate">Lokal</p>
                </div>
            </div>
            <button id="btn-mini-play" class="w-10 h-10 rounded-full shadow-neu-btn flex items-center justify-center text-neu-textDark flex-shrink-0">
                <svg id="icon-mini-play" class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>
            </button>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- LOGIKA JAVASCRIPT & ALUR DATA                -->
    <!-- ========================================== -->
    <script>
        // --- STATE & DATA ---
        let playlist = [];
        let currentIndex = -1;

        // --- DOM Elements ---
        const viewPlayer = document.getElementById('view-player');
        const viewLibrary = document.getElementById('view-library');
        const audioPlayer = document.getElementById('audio-player');
        
        // Ikon SVG
        const playIcon = '<path d="M8 5v14l11-7z" />';
        const pauseIcon = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />';

        // --- NAVIGASI ANTAR VIEW ---
        document.getElementById('btn-go-library').addEventListener('click', () => {
            viewPlayer.classList.add('hidden');
            viewLibrary.classList.remove('hidden');
        });

        document.getElementById('btn-go-player').addEventListener('click', () => {
            viewLibrary.classList.add('hidden');
            viewPlayer.classList.remove('hidden');
        });

        // --- TAMBAH SUMBER (SWEETALERT) ---
        document.getElementById('btn-add-source').addEventListener('click', () => {
            Swal.fire({
                title: '<span class="text-neu-textDark text-lg font-bold">Tambah Sumber</span>',
                html: '<p class="text-neu-text text-sm mt-2">Pilih lokasi perpustakaan lagu Anda</p>',
                background: '#222222',
                showCancelButton: true,
                confirmButtonText: 'Folder Lokal',
                cancelButtonText: 'Google Drive',
                reverseButtons: true,
                buttonsStyling: false,
                customClass: {
                    popup: 'rounded-[32px] shadow-neu border-none w-[300px] pb-6',
                    actions: 'flex gap-4 w-full px-6 mt-6',
                    confirmButton: 'flex-1 py-3 bg-neu-bg text-neu-textDark text-xs font-bold tracking-wider rounded-2xl shadow-neu-btn active:shadow-neu-inset outline-none',
                    cancelButton: 'flex-1 py-3 bg-neu-bg text-neu-textDark text-xs font-bold tracking-wider rounded-2xl shadow-neu-btn active:shadow-neu-inset outline-none'
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    // Eksekusi pemilih Folder Lokal
                    document.getElementById('folder-input').click();
                } else if (result.dismiss === Swal.DismissReason.cancel) {
                    // Eksekusi redirect ke CodeIgniter untuk login Google Drive
                    Swal.fire({
                        html: '<p class="text-neu-text text-sm">Menghubungkan ke Google...</p>',
                        background: '#222222',
                        showConfirmButton: false,
                        allowOutsideClick: false,
                        customClass: { popup: 'rounded-[24px] shadow-neu border-none w-64' },
                        didOpen: () => {
                            Swal.showLoading();
                            // Redirect ke server lokal CI4
                            window.location.href = 'http://localhost:8080/auth/login';
                        }
                    });
                }
            });
        });

        // --- MEMBACA FOLDER & MERENDER LIBRARY ---
        document.getElementById('folder-input').addEventListener('change', function(e) {
            const files = Array.from(e.target.files).filter(f => f.type.startsWith('audio/') || f.name.endsWith('.mp3'));
            
            if(files.length === 0) return Swal.fire({ html: '<p class="text-neu-textDark">Kosong</p>', background: '#222222', showConfirmButton: false, timer: 1500 });

            playlist = files; // Simpan ke state global
            const container = document.getElementById('song-list-container');
            container.innerHTML = '';

            playlist.forEach((file, index) => {
                const title = file.name.replace(/\.[^/.]+$/, "");
                const div = document.createElement('div');
                div.className = "flex items-center justify-between py-3 cursor-pointer group hover:bg-white/5 px-2 rounded-xl transition-colors";
                div.innerHTML = `
                    <div class="flex items-center gap-4 truncate">
                        <span class="text-neu-text text-xs w-4 text-center font-bold" id="indicator-${index}">${index + 1}</span>
                        <div class="truncate">
                            <h3 class="text-neu-text text-sm font-semibold group-hover:text-neu-textDark transition-colors truncate w-40" id="title-${index}">${title}</h3>
                            <p class="text-neu-text text-xs">Memori Lokal</p>
                        </div>
                    </div>
                `;
                // Menambahkan event listener saat lagu di list diklik
                div.addEventListener('click', () => playSong(index));
                container.appendChild(div);
            });
        });

        // --- LOGIKA PEMUTARAN (SINKRONISASI) ---
        function playSong(index) {
            currentIndex = index;
            const file = playlist[index];
            const title = file.name.replace(/\.[^/.]+$/, "");
            
            // Set sumber audio
            audioPlayer.src = URL.createObjectURL(file);
            audioPlayer.play();

            // Update UI Player Utama
            document.getElementById('player-title').innerText = title;
            document.getElementById('player-artist').innerText = "Memori Lokal";
            document.getElementById('icon-play-pause').innerHTML = pauseIcon;

            // Update UI Mini Player
            document.getElementById('mini-player').classList.remove('hidden');
            document.getElementById('mini-title').innerText = title;
            document.getElementById('icon-mini-play').innerHTML = pauseIcon;

            // Update warna teks di Library
            document.querySelectorAll('[id^="title-"]').forEach(el => el.classList.remove('text-neu-accent'));
            document.getElementById(`title-${index}`).classList.add('text-neu-accent', 'text-neu-textDark');

            // --- TAMBAHAN: MEDIA SESSION API (METADATA) ---
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: title,
                    artist: 'Memori Lokal - OmniTune',
                    album: 'Local Folder',
                    artwork: [
                        // Menggunakan gambar placeholder yang sama dengan UI kita
                        { src: 'https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=96&auto=format&fit=crop', sizes: '96x96', type: 'image/jpeg' },
                        { src: 'https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=256&auto=format&fit=crop', sizes: '256x256', type: 'image/jpeg' },
                        { src: 'https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=512&auto=format&fit=crop', sizes: '512x512', type: 'image/jpeg' }
                    ]
                });
            }
        }

        // --- KONTROL TOMBOL PLAY/PAUSE (Utama & Mini) ---
        function togglePlay() {
            if (!audioPlayer.src) return;
            if (audioPlayer.paused) {
                audioPlayer.play();
                document.getElementById('icon-play-pause').innerHTML = pauseIcon;
                document.getElementById('icon-mini-play').innerHTML = pauseIcon;
            } else {
                audioPlayer.pause();
                document.getElementById('icon-play-pause').innerHTML = playIcon;
                document.getElementById('icon-mini-play').innerHTML = playIcon;
            }
        }
        document.getElementById('btn-play-pause').addEventListener('click', togglePlay);
        document.getElementById('btn-mini-play').addEventListener('click', (e) => {
            e.stopPropagation(); // Mencegah klik tembus ke div mini-player
            togglePlay();
        });

        // --- KONTROL TOMBOL NEXT / PREV ---
        document.getElementById('btn-next').addEventListener('click', () => {
            if(currentIndex < playlist.length - 1) playSong(currentIndex + 1);
        });
        document.getElementById('btn-prev').addEventListener('click', () => {
            if(currentIndex > 0) playSong(currentIndex - 1);
        });

        // Lanjut lagu otomatis jika selesai
        audioPlayer.addEventListener('ended', () => {
            if(currentIndex < playlist.length - 1) playSong(currentIndex + 1);
            else togglePlay(); // Berhenti jika lagu terakhir
        });

        // --- PROGRESS BAR & WAKTU ---
        const formatTime = sec => isNaN(sec) ? "0:00" : `${Math.floor(sec / 60)}:${Math.floor(sec % 60).toString().padStart(2, '0')}`;
        
        audioPlayer.addEventListener('loadedmetadata', () => {
            document.getElementById('time-duration').innerText = formatTime(audioPlayer.duration);
        });

        audioPlayer.addEventListener('timeupdate', () => {
            document.getElementById('time-current').innerText = formatTime(audioPlayer.currentTime);
            if(audioPlayer.duration) {
                document.getElementById('progress-fill').style.width = `${(audioPlayer.currentTime / audioPlayer.duration) * 100}%`;
            }
        });

        document.getElementById('progress-container').addEventListener('click', (e) => {
            if(audioPlayer.duration) {
                audioPlayer.currentTime = (e.offsetX / e.currentTarget.clientWidth) * audioPlayer.duration;
            }
        });

        // Klik body mini player untuk buka player utama
        document.getElementById('mini-player').addEventListener('click', () => {
            viewLibrary.classList.add('hidden');
            viewPlayer.classList.remove('hidden');
        });

        // --- REGISTRASI SERVICE WORKER (PWA) ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(registration => {
                    console.log('ServiceWorker sukses didaftarkan dengan scope: ', registration.scope);
                })
                .catch(err => {
                    console.log('Pendaftaran ServiceWorker gagal: ', err);
                });
            });
        }

        // --- MEDIA SESSION API (KONTROL LAYAR KUNCI & NOTIFIKASI) ---
        if ('mediaSession' in navigator) {
            navigator.mediaSession.setActionHandler('play', () => {
                if (!audioPlayer.src) return;
                audioPlayer.play();
                document.getElementById('icon-play-pause').innerHTML = pauseIcon;
                document.getElementById('icon-mini-play').innerHTML = pauseIcon;
            });

            navigator.mediaSession.setActionHandler('pause', () => {
                if (!audioPlayer.src) return;
                audioPlayer.pause();
                document.getElementById('icon-play-pause').innerHTML = playIcon;
                document.getElementById('icon-mini-play').innerHTML = playIcon;
            });

            navigator.mediaSession.setActionHandler('previoustrack', () => {
                if(currentIndex > 0) playSong(currentIndex - 1);
            });

            navigator.mediaSession.setActionHandler('nexttrack', () => {
                if(currentIndex < playlist.length - 1) playSong(currentIndex + 1);
            });
        }

        // --- DETEKSI & INGAT STATUS LOGIN GOOGLE DRIVE ---
        function checkAuthStatus() {
            const urlParams = new URLSearchParams(window.location.search);
            
            // Jika baru saja kembali dari login Google
            if (urlParams.get('auth') === 'success') {
                // Simpan ingatan ke browser
                localStorage.setItem('drive_connected', 'true');
                
                // Tampilkan SweetAlert2 (Sesuai SOP Anda)
                Swal.fire({
                    html: `
                        <div class="flex flex-col items-center">
                            <div class="w-12 h-12 bg-neu-bg rounded-full shadow-neu flex items-center justify-center mb-4">
                                <i class="fa-solid fa-cloud-check text-green-500"></i>
                            </div>
                            <p class="text-neu-textDark font-bold">Terhubung!</p>
                            <p class="text-neu-text text-xs mt-1">Sesi Drive berhasil disimpan.</p>
                        </div>
                    `,
                    background: '#222222',
                    showConfirmButton: false,
                    timer: 2000,
                    customClass: { popup: 'rounded-[32px] shadow-neu border-none w-72' }
                });

                // Bersihkan URL
                const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
                window.history.replaceState({}, document.title, cleanUrl);
                
                // Langsung tarik lagu
                fetchDriveSongs();
            } 
            // Jika halaman direload dan browser masih ingat sudah login
            else if (localStorage.getItem('drive_connected') === 'true') {
                fetchDriveSongs();
            }
        }

        // Pastikan event listener ini ada di bagian bawah skrip Anda
        window.addEventListener('load', checkAuthStatus);

        async function fetchDriveSongs() {
                try {
                    // GANTI URL INI dengan Web App URL dari GAS Anda, jangan lupa tambah ?action=getSongs di belakangnya
                    const gasUrl = 'https://script.google.com/macros/s/AKfycbxeU51wQ2LHe_ZOvbg9bNi3UPSJ-wn_zYdZrjanDY8cYt8bND3B-8UhotAr3_aayJFA/exec?action=getSongs';
                    
                    // Gunakan mode cors, tapi tidak perlu kirim kredensial cookie lagi (karena GAS tipe "Anyone" sudah membukanya)
                    const response = await fetch(gasUrl, {
                        method: 'GET',
                        mode: 'cors'
                    });
                    
                    const data = await response.json();

                    if (data.status === 'success') {
                        console.log('Daftar Lagu Drive Berhasil Ditarik via GAS:', data.songs);
                        renderLibrary(data.songs, data.access_token); 
                    } else {
                        console.error('Gagal mengambil lagu:', data.message);
                    }
                } catch (error) {
                    console.error('CORS atau Network Error:', error);
                }
            }

        // --- MESIN PEMUTAR AUDIO ---
        if (!window.omniAudio) {
            window.omniAudio = new Audio(); 
        }

        // --- UPDATE PROGRESS BAR ---
        // Letakkan tepat di bawah inisialisasi omniAudio dan di ATAS fungsi playMusic()
        window.omniAudio.addEventListener('timeupdate', () => {
            const progressFill = document.getElementById('progress-fill');
            const current = document.getElementById('time-current');
            const duration = document.getElementById('time-duration');

            if (window.omniAudio.duration) {
                const percent = (window.omniAudio.currentTime / window.omniAudio.duration) * 100;
                if (progressFill) progressFill.style.width = percent + '%';

                // Format waktu menit:detik
                const formatTime = (time) => {
                    const mins = Math.floor(time / 60);
                    const secs = Math.floor(time % 60);
                    return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                };
                
                if (current) current.innerText = formatTime(window.omniAudio.currentTime);
                if (duration) duration.innerText = formatTime(window.omniAudio.duration);
            }
        });

        // --- FUNGSI PLAY MUSIC ---
        async function playMusic(fileId, songTitle, accessToken) {
             // ... (kode Anda yang berisi Swal.fire dan fetch blob tetap di sini) ...
            // Gunakan SweetAlert2 untuk status buffering
            Swal.fire({
                title: 'Menyiapkan Audio...',
                text: songTitle,
                background: '#222222',
                color: '#E0E0E0',
                showConfirmButton: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                // Tarik file menggunakan Fetch API agar kita bisa menyisipkan Header Authorization
                const response = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });

                if (!response.ok) {
                    throw new Error(`Google API menolak akses: HTTP ${response.status}`);
                }

                // Ubah respons menjadi data biner (Blob)
                const audioBlob = await response.blob();
                
                // Buat URL lokal sementara di dalam browser dari data biner tersebut
                const audioUrl = URL.createObjectURL(audioBlob);

                // Masukkan URL lokal tersebut ke mesin audio
                window.omniAudio.src = audioUrl;
                window.omniAudio.play()
                    .then(() => {
                        Swal.close();
                        
                        // Update UI View Player
                        document.getElementById('player-title').innerText = songTitle;
                        document.getElementById('player-artist').innerText = "Google Drive";
                        
                        // Ubah ikon ke Pause
                        const iconEl = document.getElementById('icon-play-pause');
                        iconEl.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; // Ikon Pause
                    });

            } catch (error) {
                console.error("Gagal mengunduh audio:", error);
                Swal.fire({
                    icon: 'error',
                    title: 'Akses Ditolak',
                    text: 'Gagal menarik data dari Google Drive.',
                    background: '#222222',
                    color: '#E0E0E0',
                    showConfirmButton: false,
                    timer: 3000
                });
            }
        }

        function togglePlayPause() {
            if (!window.omniAudio || !window.omniAudio.src) return;

            const iconEl = document.getElementById('icon-play-pause');

            if (window.omniAudio.paused) {
                window.omniAudio.play();
                iconEl.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; // Ikon Pause
            } else {
                window.omniAudio.pause();
                iconEl.innerHTML = '<path d="M8 5v14l11-7z"/>'; // Ikon Play
            }
        }

        // Pasang listener ke tombol yang ada di HTML Anda
        document.getElementById('btn-play-pause').addEventListener('click', togglePlayPause);

        function renderLibrary(songs, accessToken) {
            // Menggunakan ID yang sesuai dengan HTML Anda
            const songListContainer = document.getElementById('song-list-container'); 
            
            if (!songListContainer) {
                console.error('Wadah daftar lagu tidak ditemukan di HTML!');
                return;
            }

            // Bersihkan tulisan "Klik ikon di kanan atas..."
            songListContainer.innerHTML = ''; 

            if (songs.length === 0) {
                songListContainer.innerHTML = '<div class="text-center text-neu-text mt-10 text-sm">Tidak ada file audio ditemukan di Google Drive.</div>';
                return;
            }

            songs.forEach(song => {
                // Menghilangkan ekstensi (misal: .mp3) dari nama untuk tampilan yang lebih rapi
                const cleanName = song.name.replace(/\.[^/.]+$/, ""); 

                const songItem = document.createElement('div');
                // Menggunakan styling Neumorphism yang senada
                songItem.className = 'flex items-center justify-between p-4 mb-3 bg-neu-bg rounded-xl shadow-neu hover:shadow-neu-inset cursor-pointer transition-all';
                songItem.innerHTML = `
                    <div class="flex items-center gap-4 overflow-hidden">
                        <div class="w-10 h-10 flex-shrink-0 rounded-full shadow-neu-inset flex items-center justify-center text-neu-textDark">
                            <i class="fa-solid fa-music"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <!-- truncate akan memotong teks yang panjang menjadi "..." -->
                            <h4 class="text-sm font-bold text-neu-textDark truncate">${cleanName}</h4>
                            <p class="text-xs text-neu-text truncate">Google Drive</p>
                        </div>
                    </div>
                    <button class="w-8 h-8 flex-shrink-0 ml-2 rounded-full shadow-neu flex items-center justify-center text-neu-text hover:text-green-500 transition-colors">
                        <i class="fa-solid fa-play text-xs"></i>
                    </button>
                `;
                
                // Event listener saat lagu diklik
                songItem.onclick = () => {
                    console.log("Mengirim lagu ke mesin audio:", cleanName);
                    
                    // Kita oper ID File (bukan URL) beserta Access Token-nya
                    playMusic(song.id, cleanName, accessToken);
                };

                songListContainer.appendChild(songItem);
            });
        }

        // Panggil fungsi ini jika login berhasil
        if (new URLSearchParams(window.location.search).get('auth') === 'success') {
            fetchDriveSongs();
        }
    </script>
</body>
</html>
