                    fontFamily: {

    <script>
        tailwind.config = {
            theme: {
                extend: {

                        'neu-btn': '4px 4px 8px #151515, -4px -4px 8px #2f2f2f',
                        'neu-inset': 'inset 6px 6px 12px #151515, inset -6px -6px 12px #2f2f2f',
                    }
                }
            }

    </script>

</head>

    <input type="file" id="folder-input" webkitdirectory directory multiple class="hidden">

        <div class="p-6 pb-4">

                <!-- Tombol Kembali ke Player -->
                <button id="btn-go-player" class="w-10 h-10 rounded-full shadow-neu-btn flex items-center justify-center active:shadow-neu-inset">

            </div>

            </div>

        <div id="song-list-container" class="flex-1 overflow-y-auto no-scrollbar px-6 pb-24">
            <!-- List Lagu akan dirender di sini -->
            <div class="text-center text-neu-text mt-10 text-sm">Klik ikon + di kanan atas untuk menghubungkan Google Drive Anda.</div>
        </div>

        <!-- Mini Player -->
        <div id="mini-player" class="absolute bottom-6 left-6 right-6 bg-neu-bg shadow-neu rounded-2xl p-3 flex items-center justify-between z-10 cursor-pointer hidden">

                <div class="w-10 h-10 rounded-xl shadow-neu-inset p-1 flex-shrink-0">

                </div>
                <div class="truncate">
                    <h4 id="mini-title" class="text-neu-textDark text-xs font-bold truncate">Sedang dimuat</h4>
                    <p id="mini-artist" class="text-neu-text text-[10px] truncate">Lokal</p>
                </div>
            </div>
            <button id="btn-mini-play" class="w-10 h-10 rounded-full shadow-neu-btn flex items-center justify-center text-neu-textDark flex-shrink-0">

    <!-- ========================================== -->
    <!-- LOGIKA JAVASCRIPT & ALUR DATA                -->
    <!-- ========================================== -->
    <script>
        // --- KONFIGURASI GOOGLE ---
        let CLIENT_ID = ''; // Ganti dengan Client ID Anda
        let API_KEY = ''; // Wajib untuk Picker!
        const SCOPES = 'https://www.googleapis.com/auth/drive.readonly';
        
        let tokenClient;
        let userAccessToken = null;
        let pickerApiLoaded = false;
        let repeatMode = 'none'; // Pilihan: 'none', 'all', 'one'

        // --- MENGAMBIL KUNCI SECARA DINAMIS DARI GOOGLE SHEET ---
        async function inisialisasiKredensial() {
            try {
                // TEMPELKAN URL WEB APP GAS ANDA DI SINI, LALU TAMBAHKAN ?action=getCredentials
                const dbUrl = 'https://script.google.com/macros/s/AKfycbxeU51wQ2LHe_ZOvbg9bNi3UPSJ-wn_zYdZrjanDY8cYt8bND3B-8UhotAr3_aayJFA/exec?action=getCredentials'; 
                
                const response = await fetch(dbUrl);
                const data = await response.json();
                
                if (data.status === 'success') {
                    // Masukkan kunci ke memori sementara browser
                    CLIENT_ID = data.client_id;
                    API_KEY = data.api_key;
                    
                    // Setelah kunci aman, panggil skrip Google secara dinamis
                    suntikkanSkripGoogle();
                } else {
                    console.error("Gagal dari GAS:", data.message);
                }
            } catch (error) {
                console.error("Gagal mengambil kredensial keamanan", error);
            }
        }

        // --- MENYUNTIKKAN SCRIPT GOOGLE TANPA MENULISNYA DI HTML ---
        function suntikkanSkripGoogle() {
            const scriptGis = document.createElement('script');
            scriptGis.src = 'https://accounts.google.com/gsi/client';
            scriptGis.async = true;
            scriptGis.defer = true;
            scriptGis.onload = gisLoaded;
            document.head.appendChild(scriptGis);

            const scriptGapi = document.createElement('script');
            scriptGapi.src = 'https://apis.google.com/js/api.js';
            scriptGapi.async = true;
            scriptGapi.defer = true;
            scriptGapi.onload = gapiLoaded;
            document.head.appendChild(scriptGapi);
        }

        // Jalankan fungsi ini pertama kali saat halaman dibuka
        inisialisasiKredensial();

        // Fungsi ini akan dipanggil otomatis OLEH BROWSER saat file api.js selesai didownload
        function gapiLoaded() {
            gapi.load('picker', {'callback': () => { pickerApiLoaded = true; }});
        }

        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (tokenResponse) => {
                    if (tokenResponse && tokenResponse.access_token) {
                        userAccessToken = tokenResponse.access_token;
                        bukaGooglePicker(); // Panggil kotak dialog Picker!
                    }
                },
            });
        }

        function loginDanMuatLibrary() {
            if (tokenClient) tokenClient.requestAccessToken({prompt: 'consent'});
        }


        // --- GOOGLE PICKER API (FILE EXPLORER) ---
        function bukaGooglePicker() {
            if (!pickerApiLoaded || !userAccessToken) {
                Swal.fire('Memuat', 'Sistem antarmuka Google sedang disiapkan...', 'info');
                return;
            }

            // Tambahkan tipe MIME folder agar folder bisa diseleksi (bukan cuma dibuka)
            const view = new google.picker.DocsView(google.picker.ViewId.DOCS)
                .setMimeTypes('audio/mpeg,audio/mp3,audio/wav,audio/x-m4a,audio/ogg,application/vnd.google-apps.folder')
                .setIncludeFolders(true)
                .setSelectFolderEnabled(true); // PENTING: Izinkan seleksi folder!

            const picker = new google.picker.PickerBuilder()
                .addView(view)
                .setOAuthToken(userAccessToken)
                .setDeveloperKey(API_KEY)
                .setCallback(pickerCallback)
                .setTitle('Pilih Lagu atau Folder')
                .enableFeature(google.picker.Feature.MULTISELECT_ENABLED) 
                .build();

            picker.setVisible(true);
        }

        // --- CALLBACK DENGAN LOGIKA PEMBONGKAR FOLDER ---
        async function pickerCallback(data) {
            if (data[google.picker.Response.ACTION] === google.picker.Action.PICKED) {
                const docs = data[google.picker.Response.DOCUMENTS];
                let newSongs = [];

                // Tampilkan loading karena membongkar folder butuh waktu beberapa detik
                Swal.fire({
                    html: `
                        <div class="flex flex-col items-center justify-center p-2">
                            <div class="w-12 h-12 bg-neu-bg rounded-full shadow-neu-inset flex items-center justify-center mb-4 text-accent animate-spin">
                                <i class="fa-solid fa-spinner text-xl"></i>
                            </div>
                            <p class="text-neu-textDark font-bold text-sm tracking-wide">Mengekstrak Audio...</p>
                        </div>
                    `,
                    background: '#222222', showConfirmButton: false, allowOutsideClick: false,
                    customClass: { popup: 'rounded-[32px] shadow-neu border-none w-64 pb-4' }
                });

                for (const doc of docs) {
                    // Jika yang dipilih adalah FOLDER
                    if (doc.mimeType === 'application/vnd.google-apps.folder') {
                        try {
                            const folderId = doc.id;
                            // Query API untuk menarik SEMUA file audio di dalam folder tersebut
                            const query = `'${folderId}' in parents and mimeType contains 'audio/' and trashed = false`;
                            const response = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&fields=files(id,name)&pageSize=100`, {
                                headers: { 'Authorization': `Bearer ${userAccessToken}` }
                            });
                            
                            const result = await response.json();
                            if (result.files && result.files.length > 0) {
                                const folderSongs = result.files.map(f => ({
                                    type: 'drive', id: f.id, title: f.name.replace(/\.[^/.]+$/, ""), fileObject: null
                                }));
                                newSongs = [...newSongs, ...folderSongs];
                            }
                        } catch (e) {
                            console.error("Gagal mengekstrak folder:", e);
                        }
                    } 
                    // Jika yang dipilih adalah FILE LAGU biasa
                    else {
                        newSongs.push({
                            type: 'drive', id: doc.id, title: doc.name.replace(/\.[^/.]+$/, ""), fileObject: null
                        });
                    }
                }

                if (newSongs.length > 0) {
                    globalPlaylist = [...globalPlaylist, ...newSongs];
                    persiapkanPlaylist();
                    Swal.close();
                    Swal.fire({toast: true, position: 'top-end', icon: 'success', title: `${newSongs.length} Lagu Ditambahkan`, showConfirmButton: false, timer: 3000, background: '#222222', color: '#E0E0E0'});
                } else {
                    Swal.fire({icon: 'info', title: 'Kosong', text: 'Tidak ada file audio di dalam folder tersebut.', background: '#222222', color: '#E0E0E0'});
                }
            }
        }

        // --- FUNGSI EKSTRAK METADATA (DIPERBARUI UNTUK COVER MP3) ---
        function bacaMetadata(fileOrBlob) {
            return new Promise((resolve) => {
                if (!window.jsmediatags) { resolve({}); return; }
                window.jsmediatags.read(fileOrBlob, {
                    onSuccess: function(tag) {
                        let coverUrl = null;
                        const picture = tag.tags.picture;
                        // Jika ada gambar tertanam di MP3, ubah menjadi Base64
                        if (picture) {
                            let base64String = "";
                            const byteArray = new Uint8Array(picture.data);
                            for (let i = 0; i < byteArray.length; i++) {
                                base64String += String.fromCharCode(byteArray[i]);
                            }
                            coverUrl = "data:" + picture.format + ";base64," + window.btoa(base64String);
                        }
                        resolve({ title: tag.tags.title, artist: tag.tags.artist, album: tag.tags.album, cover: coverUrl });
                    },
                    onError: function(error) { resolve({}); }
                });
            });
        }

        // --- FUNGSI CARI COVER DI INTERNET (API APPLE iTUNES) ---
        async function cariCoverEksternal(title, artist) {
            // Jangan mencari jika metadata kosong / berisi teks default
            if (!title || !artist || artist === 'Memori Lokal' || artist === 'Google Drive') return null;
            
            try {
                const query = encodeURIComponent(`${title} ${artist}`);
                const response = await fetch(`https://itunes.apple.com/search?term=${query}&entity=song&limit=1`);
                const data = await response.json();
                
                if (data.results && data.results.length > 0) {
                    // iTunes mengembalikan gambar 100x100, kita ubah URL-nya agar menarik versi HD (600x600)
                    return data.results[0].artworkUrl100.replace('100x100bb', '600x600bb');
                }
            } catch (e) {
                console.log("Gagal mencari gambar eksternal:", e);
            }
            return null;
        }

        // --- STATE & DATA (DAFTAR PUTAR GLOBAL) ---
        let globalPlaylist = [];    
        let originalPlaylist = [];  
        let currentTrackIndex = -1; 
        let isShuffle = false;      

        const viewPlayer = document.getElementById('view-player');
        const viewLibrary = document.getElementById('view-library');
        const audioPlayer = document.getElementById('audio-player'); 
        if (!window.omniAudio) window.omniAudio = new Audio(); 

        const playIcon = '<path d="M8 5v14l11-7z" />';
        const pauseIcon = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />';

        // Navigasi Layar
        document.getElementById('btn-go-library').addEventListener('click', () => {
            viewPlayer.classList.add('hidden'); viewLibrary.classList.remove('hidden');
        });
        document.getElementById('btn-go-player').addEventListener('click', () => {
            viewLibrary.classList.add('hidden'); viewPlayer.classList.remove('hidden');
        });

        // Tombol Tambah Sumber
        document.getElementById('btn-add-source').addEventListener('click', () => {
            Swal.fire({
                title: '<span class="text-neu-textDark text-lg font-bold">Tambah Sumber</span>',
                html: '<p class="text-neu-text text-sm mt-2">Pilih lokasi perpustakaan lagu Anda</p>',
                background: '#222222', showCancelButton: true,
                confirmButtonText: 'Folder Lokal', cancelButtonText: 'Google Drive',
                reverseButtons: true, buttonsStyling: false,
                customClass: {
                    popup: 'rounded-[32px] shadow-neu border-none w-[300px] pb-6', actions: 'flex gap-4 w-full px-6 mt-6',
                    confirmButton: 'flex-1 py-3 bg-neu-bg text-neu-textDark text-xs font-bold tracking-wider rounded-2xl shadow-neu-btn active:shadow-neu-inset outline-none',
                    cancelButton: 'flex-1 py-3 bg-neu-bg text-neu-textDark text-xs font-bold tracking-wider rounded-2xl shadow-neu-btn active:shadow-neu-inset outline-none'
                }
            }).then((result) => {
                if (result.isConfirmed) document.getElementById('folder-input').click();
                else if (result.dismiss === Swal.DismissReason.cancel) loginDanMuatLibrary();
            });
        });

        // --- MEMBACA LOKAL DENGAN METADATA ---
        document.getElementById('folder-input').addEventListener('change', async function(e) {
            const files = Array.from(e.target.files).filter(f => f.type.startsWith('audio/') || f.name.endsWith('.mp3'));
            if(files.length === 0) return;

            Swal.fire({ title: 'Membaca Tag Audio...', text: 'Mohon tunggu sebentar', background: '#222222', color: '#E0E0E0', showConfirmButton: false, allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

            const newLocalSongs = [];
            // ... (di dalam event listener folder-input)
            for (let file of files) {
                const meta = await bacaMetadata(file);
                newLocalSongs.push({
                    type: 'local', id: file.name, originalName: file.name.replace(/\.[^/.]+$/, ""),
                    title: meta.title || null, artist: meta.artist || null, album: meta.album || null, 
                    cover: meta.cover || null, // <--- Baris ini disisipkan
                    fileObject: file
                });
            }
            
            globalPlaylist = [...globalPlaylist, ...newLocalSongs];
            persiapkanPlaylist();
            
            Swal.close();
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: `${files.length} Lagu Lokal Ditambahkan`, showConfirmButton: false, timer: 3000, background: '#222222', color: '#E0E0E0' });
        });

        // --- PENCARIAN REAL-TIME (BARU) ---
        document.getElementById('input-search').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const filteredList = globalPlaylist.filter(track => {
                // Gabungkan semua data menjadi satu teks panjang untuk dicari
                const dataPencarian = `${track.originalName || ''} ${track.title || ''} ${track.artist || ''} ${track.album || ''}`.toLowerCase();
                return dataPencarian.includes(keyword);
            });
            renderUnifiedLibrary(filteredList);
        });

        // --- LOGIKA DAFTAR PUTAR & RENDER UI ---
        function persiapkanPlaylist() {
            originalPlaylist = [...globalPlaylist]; 
            if (isShuffle) acakDaftarLagu();        
            renderUnifiedLibrary();  
            
            // --- FITUR AUTO-SAVE ---
            // Hanya simpan lagu Google Drive ke memori browser
            const driveSongs = globalPlaylist.filter(song => song.type === 'drive');
            localStorage.setItem('omnitune_saved_playlist', JSON.stringify(driveSongs));               
        }

        // --- RENDER DENGAN METADATA (BARU) ---
        function renderUnifiedLibrary(listToRender = globalPlaylist) {
            const container = document.getElementById('song-list-container'); 
            if (!container) return;
            container.innerHTML = ''; 

            if (listToRender.length === 0) {
                container.innerHTML = '<div class="text-center text-neu-text mt-10 text-sm">Tidak ada lagu ditemukan.</div>'; return;
            }

            listToRender.forEach((track) => {
                const icon = track.type === 'local' ? '<i class="fa-solid fa-music"></i>' : '<i class="fa-solid fa-cloud"></i>';
                
                // Prioritaskan Metadata. Jika kosong, gunakan nama file/sumber asli
                const displayTitle = track.title || track.originalName;
                const displayArtist = track.artist || (track.type === 'local' ? 'Memori Lokal' : 'Google Drive');
                
                // Cari index asli dari lagu ini di globalPlaylist untuk pemutaran yang tepat
                const realIndex = globalPlaylist.indexOf(track);
                const isActive = realIndex === currentTrackIndex ? 'text-green-500' : 'text-neu-textDark';
                
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between p-4 mb-3 bg-neu-bg rounded-xl shadow-neu hover:shadow-neu-inset cursor-pointer transition-all group';
                div.innerHTML = `
                    <div class="flex items-center gap-4 overflow-hidden w-full">
                        <div class="w-10 h-10 flex-shrink-0 rounded-full shadow-neu-inset flex items-center justify-center text-neu-text">
                            ${icon}
                        </div>
                        <div class="flex-1 min-w-0 pr-2">
                            <h4 class="text-sm font-bold ${isActive} truncate group-hover:text-green-500 transition-colors">${displayTitle}</h4>
                            <p class="text-xs text-neu-text truncate">${displayArtist} ${track.album ? '• ' + track.album : ''}</p>
                        </div>
                    </div>
                `;
                div.onclick = () => playTrack(realIndex);
                container.appendChild(div);
            });
        }

        // --- MESIN PEMUTAR TUNGGAL ---
        async function playTrack(index) {
            if (index < 0 || index >= globalPlaylist.length) return;
            
            if (!audioPlayer.paused) audioPlayer.pause();
            if (window.omniAudio && !window.omniAudio.paused) window.omniAudio.pause();

            currentTrackIndex = index;
            const track = globalPlaylist[index];
            const DEFAULT_COVER = "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=600&auto=format&fit=crop";
            
            const displayTitle = track.title || track.originalName;
            const displayArtist = track.artist || (track.type === 'local' ? 'Memori Lokal' : 'Google Drive');

            // Set UI ke Default sementara memuat
            document.getElementById('player-title').innerText = displayTitle;
            document.getElementById('player-artist').innerText = displayArtist;
            document.getElementById('icon-play-pause').innerHTML = pauseIcon;
            document.getElementById('mini-title').innerText = displayTitle;
            document.getElementById('icon-mini-play').innerHTML = pauseIcon;
            document.getElementById('player-cover').src = track.cover || DEFAULT_COVER;
            document.getElementById('mini-cover').src = track.cover || DEFAULT_COVER;

            const searchKeyword = document.getElementById('input-search').value.toLowerCase();
            if(searchKeyword === "") renderUnifiedLibrary(globalPlaylist);
            document.getElementById('mini-player').classList.remove('hidden');

            // Helper untuk mengupdate Gambar dan Media Session (Lockscreen)
            const updateVisual = async (metaTitle, metaArtist) => {
                let finalCover = track.cover;
                if (!finalCover) {
                    finalCover = await cariCoverEksternal(metaTitle, metaArtist);
                    if (finalCover) { track.cover = finalCover; persiapkanPlaylist(); } // Simpan agar tak perlu download API lagi
                }
                const activeCover = finalCover || DEFAULT_COVER;
                document.getElementById('player-cover').src = activeCover;
                document.getElementById('mini-cover').src = activeCover;

                if ('mediaSession' in navigator) {
                    navigator.mediaSession.metadata = new MediaMetadata({ 
                        title: metaTitle, artist: metaArtist, album: track.album || '',
                        artwork: [{ src: activeCover, sizes: '512x512', type: 'image/jpeg' }]
                    });
                }
            };

            // MESIN LOKAL
            if (track.type === 'local') {
                audioPlayer.src = URL.createObjectURL(track.fileObject); audioPlayer.play();
                updateVisual(displayTitle, displayArtist);
            } 
            // MESIN GOOGLE DRIVE
            else if (track.type === 'drive') {
                if (!userAccessToken) {
                    // ... (Alert Sesi Berakhir milik Anda sebelumnya tetap sama) ...
                    Swal.fire({ title: 'Sesi Berakhir', text: 'Koneksi terputus. Silakan sambungkan kembali.', icon: 'info', background: '#222222', color: '#E0E0E0', confirmButtonColor: '#22c55e', confirmButtonText: 'Sambungkan', showCancelButton: true, cancelButtonText: 'Batal', cancelButtonColor: '#444444' }).then((r) => { if (r.isConfirmed) loginDanMuatLibrary(); });
                    return; 
                } 
                
                Swal.fire({ html: `<div class="flex flex-col items-center justify-center p-2"><div class="w-12 h-12 bg-neu-bg rounded-full shadow-neu-inset flex items-center justify-center mb-4 text-green-500 animate-spin"><i class="fa-solid fa-spinner text-xl"></i></div><p class="text-neu-textDark font-bold text-sm tracking-wide text-center truncate w-48">${displayTitle}</p></div>`, background: '#222222', showConfirmButton: false, customClass: { popup: 'rounded-[32px] shadow-neu border-none w-64 pb-4' } });

                try {
                    const response = await fetch(`https://www.googleapis.com/drive/v3/files/${track.id}?alt=media`, { headers: { 'Authorization': `Bearer ${userAccessToken}` } });
                    if (!response.ok) throw new Error();
                    const audioBlob = await response.blob();
                    
                    // --- Ekstrak Metadata Drive ---
                    const meta = await bacaMetadata(audioBlob);
                    let metaDiperbarui = false;
                    if(meta.title && !track.title) { track.title = meta.title; metaDiperbarui = true; }
                    if(meta.artist && !track.artist) { track.artist = meta.artist; metaDiperbarui = true; }
                    if(meta.album && !track.album) { track.album = meta.album; metaDiperbarui = true; }
                    if(meta.cover && !track.cover) { track.cover = meta.cover; metaDiperbarui = true; }
                    
                    const finalTitle = track.title || track.originalName;
                    const finalArtist = track.artist || 'Google Drive';

                    if(metaDiperbarui) {
                        persiapkanPlaylist(); // Simpan metadata Drive ke localStorage!
                        document.getElementById('player-title').innerText = finalTitle;
                        document.getElementById('player-artist').innerText = finalArtist;
                        document.getElementById('mini-title').innerText = finalTitle;
                    }

                    window.omniAudio.src = URL.createObjectURL(audioBlob); window.omniAudio.play().then(() => Swal.close());
                    
                    // Tarik gambar eksternal jika internal gagal
                    updateVisual(finalTitle, finalArtist);
                } catch (err) { Swal.fire('Error', 'Gagal memutar audio.', 'error'); }
            }
        }

        // --- LOGIKA REPEAT (BARU) ---
        function toggleRepeat() {
            const btnRepeat = document.getElementById('btn-repeat');
            const badge = document.getElementById('repeat-one-badge');

            if (repeatMode === 'none') {
                repeatMode = 'all';
                btnRepeat.style.color = '#22c55e'; // Hijau (Repeat All)
                badge.classList.add('hidden');
                Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Repeat All', showConfirmButton: false, timer: 1500, background: '#222222', color: '#E0E0E0' });
            } else if (repeatMode === 'all') {
                repeatMode = 'one';
                btnRepeat.style.color = '#22c55e'; // Tetap Hijau
                badge.classList.remove('hidden'); // Tampilkan angka 1
                Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Repeat One', showConfirmButton: false, timer: 1500, background: '#222222', color: '#E0E0E0' });
            } else {
                repeatMode = 'none';
                btnRepeat.style.color = ''; // Kembali ke default
                badge.classList.add('hidden');
                Swal.fire({ toast: true, position: 'top-end', icon: 'info', title: 'Repeat Off', showConfirmButton: false, timer: 1500, background: '#222222', color: '#E0E0E0' });
            }
        }

        // --- UPDATE FUNGSI PLAY NEXT ---
        function playNext() {
            if (currentTrackIndex < globalPlaylist.length - 1) {
                playTrack(currentTrackIndex + 1);
            } else {
                // Jika sudah di lagu terakhir
                if (repeatMode === 'all') {
                    playTrack(0); // Putar dari awal
                } else {
                    // Jika no-repeat, berhenti di lagu terakhir
                    const activeAudio = (window.omniAudio.src && !window.omniAudio.paused) ? window.omniAudio : audioPlayer;
                    activeAudio.pause();
                    document.getElementById('icon-play-pause').innerHTML = playIcon;
                    document.getElementById('icon-mini-play').innerHTML = playIcon;
                }
            }
        }

        // --- UPDATE EVENT ENDED ---
        const handleEnded = () => {
            if (repeatMode === 'one') {
                // Putar ulang lagu yang sama
                playTrack(currentTrackIndex);
            } else {
                playNext();
            }
        };

        audioPlayer.addEventListener('ended', handleEnded);
        window.omniAudio.addEventListener('ended', handleEnded);

        // Pasang Event Listener ke tombol baru
        document.getElementById('btn-repeat').addEventListener('click', toggleRepeat);

        function playPrev() {
            if (currentTrackIndex > 0) playTrack(currentTrackIndex - 1);
        }

        function toggleShuffle() {
            if (globalPlaylist.length === 0) return;
            isShuffle = !isShuffle;
            
            const btnShuffle = document.getElementById('btn-shuffle');
            
            if (isShuffle) {
                // Cabut warna abu-abu, tanam warna hijau
                if(btnShuffle) {
                    btnShuffle.classList.remove('text-neu-text');
                    btnShuffle.classList.add('text-green-500');
                }
                
                const currentId = currentTrackIndex > -1 ? globalPlaylist[currentTrackIndex].id : null;
                acakDaftarLagu();
                if (currentId) currentTrackIndex = globalPlaylist.findIndex(t => t.id === currentId);
                
                Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Daftar Diacak', showConfirmButton: false, timer: 1500, background: '#222222', color: '#E0E0E0' });
            } else {
                // Cabut warna hijau, tanam kembali warna abu-abu
                if(btnShuffle) {
                    btnShuffle.classList.remove('text-green-500');
                    btnShuffle.classList.add('text-neu-text');
                }
                
                const currentId = currentTrackIndex > -1 ? globalPlaylist[currentTrackIndex].id : null;
                globalPlaylist = [...originalPlaylist]; 
                if (currentId) currentTrackIndex = globalPlaylist.findIndex(t => t.id === currentId);
                
                Swal.fire({ toast: true, position: 'top-end', icon: 'info', title: 'Urutan Normal', showConfirmButton: false, timer: 1500, background: '#222222', color: '#E0E0E0' });
            }
            renderUnifiedLibrary();
        }

        function acakDaftarLagu() {
            for (let i = globalPlaylist.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [globalPlaylist[i], globalPlaylist[j]] = [globalPlaylist[j], globalPlaylist[i]];
            }
        }

        const btnNext = document.getElementById('btn-next');
        const btnPrev = document.getElementById('btn-prev');
        const btnShuffle = document.getElementById('btn-shuffle'); // Pastikan ID ini ada di HTML tombol shuffle Anda!
        
        if (btnNext) btnNext.addEventListener('click', playNext);
        if (btnPrev) btnPrev.addEventListener('click', playPrev);
        if (btnShuffle) btnShuffle.addEventListener('click', toggleShuffle);

        audioPlayer.addEventListener('ended', playNext);
        window.omniAudio.addEventListener('ended', playNext);

        // --- PROGRESS BAR & KONTROL PLAY/PAUSE ---
        const formatTime = sec => isNaN(sec) ? "0:00" : `${Math.floor(sec / 60)}:${Math.floor(sec % 60).toString().padStart(2, '0')}`;
        
        function updateProgressUI(audioElement) {
            document.getElementById('time-current').innerText = formatTime(audioElement.currentTime);
            document.getElementById('time-duration').innerText = formatTime(audioElement.duration);
            if(audioElement.duration) {
                document.getElementById('progress-fill').style.width = `${(audioElement.currentTime / audioElement.duration) * 100}%`;
            }
        }

        audioPlayer.addEventListener('timeupdate', () => updateProgressUI(audioPlayer));
        window.omniAudio.addEventListener('timeupdate', () => updateProgressUI(window.omniAudio));

        document.getElementById('progress-container').addEventListener('click', (e) => {
            const activeAudio = (window.omniAudio.src && !window.omniAudio.paused) ? window.omniAudio : audioPlayer;
            if(activeAudio.duration) activeAudio.currentTime = (e.offsetX / e.currentTarget.clientWidth) * activeAudio.duration;
        });

        function togglePlay() {
            const activeAudio = (window.omniAudio.src && window.omniAudio.currentTime > 0 && !window.omniAudio.ended) ? window.omniAudio : audioPlayer;
            if (!activeAudio.src) return;

            if (activeAudio.paused) {
                activeAudio.play();
                document.getElementById('icon-play-pause').innerHTML = pauseIcon;
                document.getElementById('icon-mini-play').innerHTML = pauseIcon;
            } else {
                activeAudio.pause();
                document.getElementById('icon-play-pause').innerHTML = playIcon;
                document.getElementById('icon-mini-play').innerHTML = playIcon;
            }
        }

        document.getElementById('btn-play-pause').addEventListener('click', togglePlay);
        document.getElementById('btn-mini-play').addEventListener('click', (e) => { e.stopPropagation(); togglePlay(); });
        document.getElementById('mini-player').addEventListener('click', () => { viewLibrary.classList.add('hidden'); viewPlayer.classList.remove('hidden'); });

        
        if ('serviceWorker' in navigator) {
            // --- MEMUAT MEMORI PLAYLIST SAAT APLIKASI DIBUKA ---
            window.addEventListener('DOMContentLoaded', () => {
                const savedData = localStorage.getItem('omnitune_saved_playlist');
                if (savedData) {
                    globalPlaylist = JSON.parse(savedData);
                    persiapkanPlaylist();
                }
            });
            window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Gagal', err)));
        }
    </script>
</body>
</html>
